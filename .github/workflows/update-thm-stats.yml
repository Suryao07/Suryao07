name: Update TryHackMe Stats

on:
  schedule:
    - cron: "17 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-thm-stats:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Update TryHackMe stats
        shell: python
        run: |
          import json
          import re
          import urllib.request
          from pathlib import Path

          url = "https://tryhackme.com/api/v2/public-profile?username=suryao07"
          request = urllib.request.Request(
              url,
              headers={"User-Agent": "Mozilla/5.0 GitHub-Actions"}
          )

          with urllib.request.urlopen(request, timeout=30) as response:
              payload = json.load(response)

          if payload.get("status") != "success":
              raise RuntimeError("TryHackMe API returned an unsuccessful response")

          data = payload["data"]
          top = data["topPercentage"]
          streak = data["streak"]
          rooms = data["completedRoomsNumber"]
          badges = data["badgesNumber"]

          path = Path("README.md")
          text = path.read_text(encoding="utf-8")

          replacements = [
              (
                  r'Top \d+%(?=</b><br/>\s*<sub>TryHackMe Global Rank</sub>)',
                  f'Top {top}%'
              ),
              (
                  r'\d+(?=</b><br/>\s*<sub>Day Streak</sub>)',
                  str(streak)
              ),
              (
                  r'\d+(?=</b><br/>\s*<sub>Rooms Completed</sub>)',
                  str(rooms)
              ),
              (
                  r'\d+(?=</b><br/>\s*<sub>THM Badges</sub>)',
                  str(badges)
              ),
          ]

          for pattern, replacement in replacements:
              text, count = re.subn(pattern, replacement, text, count=1)
              if count != 1:
                  raise RuntimeError(f"README stat pattern not found: {pattern}")

          profile_pattern = (
              r'> \*\*Rank:\*\* `\[0x7\]\[ADEPT\]` &nbsp;\|&nbsp; '
              r'\*\*Global:\*\* Top \d+% &nbsp;\|&nbsp; '
              r'\*\*Streak:\*\* 🔥 \d+ days &nbsp;\|&nbsp; '
              r'\*\*Rooms:\*\* \d+ &nbsp;\|&nbsp; '
              r'\*\*Badges:\*\* \d+'
          )

          profile_line = (
              f'> **Rank:** `[0x7][ADEPT]` &nbsp;|&nbsp; '
              f'**Global:** Top {top}% &nbsp;|&nbsp; '
              f'**Streak:** 🔥 {streak} days &nbsp;|&nbsp; '
              f'**Rooms:** {rooms} &nbsp;|&nbsp; '
              f'**Badges:** {badges}'
          )

          text, count = re.subn(profile_pattern, profile_line, text, count=1)
          if count != 1:
              raise RuntimeError("TryHackMe profile stats line was not found")

          path.write_text(text, encoding="utf-8")

          print(f"Top {top}% | Streak {streak} | Rooms {rooms} | Badges {badges}")

      - name: Commit changes
        run: |
          if git diff --quiet README.md; then
            echo "TryHackMe stats are already current."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md
          git commit -m "chore: update TryHackMe stats"
          git push
