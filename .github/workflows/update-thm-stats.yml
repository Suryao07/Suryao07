name: Update TryHackMe Stats

on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-thm-stats:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Fetch and update TryHackMe stats
        shell: python
        run: |
          import json
          import re
          import urllib.request
          from pathlib import Path

          API_URL = "https://tryhackme.com/api/v2/public-profile?username=suryao07"

          request = urllib.request.Request(
              API_URL,
              headers={"User-Agent": "Mozilla/5.0 GitHub-Actions-THM-Stats"},
          )

          with urllib.request.urlopen(request, timeout=30) as response:
              payload = json.load(response)

          if payload.get("status") != "success":
              raise RuntimeError("TryHackMe API did not return success")

          data = payload["data"]

          top_percentage = data["topPercentage"]
          streak = data["streak"]
          rooms = data["completedRoomsNumber"]
          badges = data["badgesNumber"]

          readme_path = Path("README.md")
          readme = readme_path.read_text(encoding="utf-8")

          table_start = "<!-- THM_TABLE_START -->"
          table_end = "<!-- THM_TABLE_END -->"
          stats_start = "<!-- THM_STATS_START -->"
          stats_end = "<!-- THM_STATS_END -->"

          for marker in (table_start, table_end, stats_start, stats_end):
              if marker not in readme:
                  raise RuntimeError(f"README marker not found: {marker}")

          table_block = readme.split(table_start, 1)[1].split(table_end, 1)[0]
          table_block = re.sub(
              r'(<b style="font-size:28px; color:#4F8EF7">)Top \d+%(</b><br/>\s*<sub>TryHackMe Global Rank</sub>)',
              rf'\g<1>Top {top_percentage}%\2',
              table_block,
          )
          table_block = re.sub(
              r'(<b style="font-size:28px; color:#4F8EF7">)\d+(</b><br/>\s*<sub>Day Streak</sub>)',
              rf'\g<1>{streak}\2',
              table_block,
          )
          table_block = re.sub(
              r'(<b style="font-size:28px; color:#4F8EF7">)\d+(</b><br/>\s*<sub>Rooms Completed</sub>)',
              rf'\g<1>{rooms}\2',
              table_block,
          )
          table_block = re.sub(
              r'(<b style="font-size:28px; color:#4F8EF7">)\d+(</b><br/>\s*<sub>THM Badges</sub>)',
              rf'\g<1>{badges}\2',
              table_block,
          )

          stats_line = (
              f'> **Rank:** `[0x7][ADEPT]` &nbsp;|&nbsp; '
              f'**Global:** Top {top_percentage}% &nbsp;|&nbsp; '
              f'**Streak:** 🔥 {streak} days &nbsp;|&nbsp; '
              f'**Rooms:** {rooms} &nbsp;|&nbsp; '
              f'**Badges:** {badges}'
          )

          before_table, rest = readme.split(table_start, 1)
          _, after_table = rest.split(table_end, 1)
          readme = before_table + table_start + table_block + table_end + after_table

          before_stats, rest = readme.split(stats_start, 1)
          _, after_stats = rest.split(stats_end, 1)
          readme = (
              before_stats
              + stats_start
              + "\n"
              + stats_line
              + "\n"
              + stats_end
              + after_stats
          )

          readme_path.write_text(readme, encoding="utf-8")

      - name: Commit updated stats
        run: |
          if git diff --quiet README.md; then
            echo "TryHackMe stats are already up to date."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add README.md
          git commit -m "chore: update TryHackMe stats"
          git push
