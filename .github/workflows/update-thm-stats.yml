name: Update TryHackMe Stats

on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-thm-stats:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Fetch and update TryHackMe stats
        shell: python
        run: |
          import json
          import re
          import urllib.request
          from pathlib import Path

          API_URL = "https://tryhackme.com/api/v2/public-profile?username=suryao07"

          request = urllib.request.Request(
              API_URL,
              headers={"User-Agent": "Mozilla/5.0"},
          )

          with urllib.request.urlopen(request, timeout=30) as response:
              payload = json.load(response)

          if payload.get("status") != "success":
              raise RuntimeError("TryHackMe API did not return success")

          data = payload["data"]

          top_percentage = data["topPercentage"]
          streak = data["streak"]
          rooms = data["completedRoomsNumber"]
          badges = data["badgesNumber"]

          readme_path = Path("README.md")
          readme = readme_path.read_text(encoding="utf-8")

          readme = re.sub(
              r"Top \d+%(?=\s*</b><br/>\s*<sub>TryHackMe Global Rank</sub>)",
              f"Top {top_percentage}%",
              readme,
          )

          readme = re.sub(
              r"\d+(?=\s*</b><br/>\s*<sub>Day Streak</sub>)",
              str(streak),
              readme,
          )

          readme = re.sub(
              r"\d+(?=\s*</b><br/>\s*<sub>Rooms Completed</sub>)",
              str(rooms),
              readme,
          )

          readme = re.sub(
              r"\d+(?=\s*</b><br/>\s*<sub>THM Badges</sub>)",
              str(badges),
              readme,
          )

          stats_pattern = (
              r'> \*\*Rank:\*\* `\[0x7\]\[ADEPT\]`.*?'
              r'\*\*Badges:\*\* \d+'
          )

          stats_line = (
              f'> **Rank:** `[0x7][ADEPT]` &nbsp;|&nbsp; '
              f'**Global:** Top {top_percentage}% &nbsp;|&nbsp; '
              f'**Streak:** 🔥 {streak} days &nbsp;|&nbsp; '
              f'**Rooms:** {rooms} &nbsp;|&nbsp; '
              f'**Badges:** {badges}'
          )

          readme, replacements = re.subn(
              stats_pattern,
              stats_line,
              readme,
              count=1,
          )

          if replacements != 1:
              raise RuntimeError(
                  "TryHackMe profile stats line was not found in README"
              )

          readme_path.write_text(readme, encoding="utf-8")

          print(f"Top: {top_percentage}%")
          print(f"Streak: {streak}")
          print(f"Rooms: {rooms}")
          print(f"Badges: {badges}")

      - name: Commit updated stats
        run: |
          if git diff --quiet README.md; then
            echo "TryHackMe stats are already up to date."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add README.md
          git commit -m "chore: update TryHackMe stats"
          git push
